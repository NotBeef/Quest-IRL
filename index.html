<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Side Quest RPG</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Side Quests">
    
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #bc13fe; --bg: #050505; --card: #121212; --text: #ffffff; --xp-color: #39ff14; --accent: #ffcc00; --danger: #ff4444; }
        body { font-family: 'Pixelify Sans', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; overscroll-behavior-y: contain; }
        .container { width: 100%; max-width: 500px; padding-bottom: env(safe-area-inset-bottom); margin-bottom: 60px; }
        h1 { color: var(--primary); text-align: center; font-size: 3rem; text-shadow: 4px 4px 0px #5a008a; margin-bottom: 5px;}
        .goal-banner { background: #1a1a1a; border: 2px dashed var(--accent); padding: 10px; text-align: center; margin-bottom: 20px; color: var(--accent); font-size: 1.2rem; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 10px 0; }
        .tab-btn { background: #222; border: 2px solid #444; padding: 10px; flex: 1; color: #888; cursor: pointer; border-bottom: 4px solid #111; font-size: 0.9rem; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); border-bottom: 4px solid #5a008a; }
        
        .quest-form { background: var(--card); padding: 20px; border: 3px solid var(--primary); margin-bottom: 30px; box-shadow: 6px 6px 0px #5a008a; }
        input, select, button { font-family: 'Pixelify Sans', sans-serif; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #333; background: #1a1a1a; color: white; font-size: 16px !important; box-sizing: border-box; }
        button { background: var(--primary); border: none; border-bottom: 4px solid #5a008a; color: white; text-transform: uppercase; cursor: pointer; }
        button:disabled { opacity: 0.5 !important; filter: grayscale(1); }
        
        .quest-card { background: var(--card); padding: 20px; margin-bottom: 20px; border: 3px solid #333; position: relative; }
        .verified-border { border-color: var(--xp-color) !important; box-shadow: 0 0 10px var(--xp-color); }
        .xp-tag { color: var(--xp-color); font-size: 1.3rem; }
        .player-tag { color: var(--accent); font-size: 1rem; margin-bottom: 10px; display: block; border-left: 3px solid var(--accent); padding-left: 8px; }
        .preview-img { width: 100%; height: 250px; object-fit: cover; margin-top: 15px; border: 2px solid var(--primary); border-radius: 4px; display: block; }
        
        .btn-cancel { background: #444; border-bottom: 4px solid #222; margin-top: 5px; font-size: 0.8rem; }
        .admin-del-overlay { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; border: none; padding: 5px 10px; font-size: 0.8rem; display: none; z-index: 10; width: auto; }
        .admin-active .admin-del-overlay, .admin-active .admin-only { display: block; }
        
        #news-flash { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: black; padding: 15px 30px; border-radius: 50px; font-weight: bold; z-index: 2000; transition: 0.5s; border: 3px solid black; }
        #news-flash.show { top: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 2px solid var(--primary); margin-bottom: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .small-del-btn { display: none; background: var(--danger); font-size: 0.7rem; padding: 5px; width: auto; margin: 0; }
        .admin-only { display: none; border: 1px solid var(--danger); padding: 10px; margin-bottom: 20px; }
        .hidden { display: none; }
        footer { margin-top: 40px; color: #333; font-size: 0.7rem; cursor: pointer; opacity: 0.5; padding-bottom: 20px;}
    </style>
</head>
<body id="mainBody">

<div id="news-flash">NEWS</div>

<div class="container">
    <h1>SIDE QUESTS</h1>
    <div class="goal-banner" id="goal-display">GOAL: 5000 XP</div>

    <div class="tabs">
        <button id="btn-active" class="tab-btn active" onclick="switchTab('active')">QUESTS</button>
        <button id="btn-completed" class="tab-btn" onclick="switchTab('completed')">HALL</button>
        <button id="btn-scores" class="tab-btn" onclick="switchTab('scores')">RANK</button>
    </div>

    <div id="active-section">
        <div class="quest-form">
            <h3 style="margin:0; color:var(--xp-color)">[ NEW QUEST ]</h3>
            <input type="text" id="questTitle" placeholder="Quest Title (e.g. 'The Gym Run')">
            <input type="text" id="questDesc" placeholder="Description/Objective...">
            <select id="riskLevel">
                <option value="1">Level 1: sweaty</option>
                <option value="2">Level 2: risky</option>
                <option value="3">Level 3: high life</option>
                <option value="4">Level 4: restricted</option>
                <option value="5">Level 5: insane</option>
            </select>
            <button id="submitQuest">Deploy</button>
        </div>
        <div id="activeFeed"></div>
    </div>

    <div id="completed-section" class="hidden"><div id="completedFeed"></div></div>

    <div id="scores-section" class="hidden">
        <div class="admin-only">
            <input type="number" id="newGoalInput" placeholder="Set XP Goal">
            <button onclick="updateGoal()">Set New Goal</button>
            <button style="background:var(--danger)" onclick="resetRound()">TERMINATE ROUND</button>
        </div>
        <table><thead><tr><th>HERO</th><th>XP</th><th>-</th></tr></thead><tbody id="score-body"></tbody></table>
        <h2 style="text-align:center;color:var(--accent)">ALL-TIME LEGENDS</h2>
        <table><thead><tr><th>HERO</th><th>QUESTS</th><th>TOTAL XP</th></tr></thead><tbody id="all-time-body"></tbody></table>
    </div>
    <footer onclick="adminLogin()">Admin Access</footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, increment, setDoc, getDoc, runTransaction, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDw9qBL6_OxdYBhs9zghFjgueMkuLMvhiM",
      authDomain: "side-quests-9466b.firebaseapp.com",
      projectId: "side-quests-9466b",
      storageBucket: "side-quests-9466b.firebasestorage.app",
      messagingSenderId: "516078043611",
      appId: "1:516078043611:web:eb566c5cb127b56a8f67fe"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const questCol = collection(db, "quests");
    const playerCol = collection(db, "players");

    let firstLoad = true;
    let isAdmin = false;
    let playerDropdownHtml = '<option value="">-- Choose Hero --</option>';

    function showNews() {
        if(firstLoad) return;
        const flash = document.getElementById('news-flash');
        flash.classList.add('show');
        setTimeout(() => flash.classList.remove('show'), 3000);
    }

    window.adminLogin = () => { 
        if(prompt("Code:") === "3250") { 
            isAdmin = true; 
            document.getElementById('mainBody').classList.add('admin-active'); 
            alert("Admin Mode Engaged. You can now delete any quest.");
        } 
    };
    
    window.switchTab = (type) => {
        ['active', 'completed', 'scores'].forEach(t => {
            document.getElementById(t + '-section').classList.add('hidden');
            document.getElementById('btn-' + t).classList.remove('active');
        });
        document.getElementById(type + '-section').classList.remove('hidden');
        document.getElementById('btn-' + type).classList.add('active');
    };

    onSnapshot(doc(db, "metadata", "roundSettings"), (d) => {
        if(d.exists()) document.getElementById('goal-display').innerText = `GOAL: ${d.data().goal} XP`;
    });

    onSnapshot(playerCol, (snapshot) => {
        const scoreBody = document.getElementById('score-body');
        const allTimeBody = document.getElementById('all-time-body');
        scoreBody.innerHTML = ""; allTimeBody.innerHTML = "";
        playerDropdownHtml = '<option value="">-- Choose Hero --</option>';
        let playersArr = [];
        snapshot.forEach(pDoc => {
            playersArr.push({ id: pDoc.id, ...pDoc.data() });
            playerDropdownHtml += `<option value="${pDoc.id}">${pDoc.id.toUpperCase()}</option>`;
        });
        playersArr.sort((a,b) => (b.xp || 0) - (a.xp || 0)).forEach(p => {
            scoreBody.innerHTML += `<tr><td>${p.id.toUpperCase()}</td><td style="color:var(--xp-color)">${p.xp || 0}</td><td><button class="small-del-btn" onclick="deleteHero('${p.id}')">X</button></td></tr>`;
        });
        playersArr.sort((a,b) => (b.allTimeXP || 0) - (a.allTimeXP || 0)).forEach(p => {
            allTimeBody.innerHTML += `<tr><td>${p.id.toUpperCase()}</td><td>${p.allTimeQuests || 0}</td><td style="color:var(--accent)">${p.allTimeXP || 0} XP</td></tr>`;
        });
    });

    onSnapshot(query(questCol, orderBy("createdAt", "desc")), (snapshot) => {
        const aFeed = document.getElementById('activeFeed');
        const cFeed = document.getElementById('completedFeed');
        if (!firstLoad && snapshot.docChanges().length > 0) showNews();
        firstLoad = false;

        aFeed.innerHTML = ""; cFeed.innerHTML = "";
        const processedThisCycle = new Set();

        snapshot.forEach(async (qDoc) => {
            const data = qDoc.data();
            const id = qDoc.id;
            if(processedThisCycle.has(id)) return;
            processedThisCycle.add(id);

            const isVerified = (data.votes >= 2);

            // PAYOUT LOGIC
            if (isVerified && !data.scoreUpdated && data.claimedBy) {
                try {
                    await runTransaction(db, async (t) => {
                        const qRef = doc(db, "quests", id);
                        const qSnap = await t.get(qRef);
                        if (qSnap.data().scoreUpdated) return;
                        const pRef = doc(db, "players", data.claimedBy.toLowerCase());
                        const pSnap = await t.get(pRef);
                        t.update(qRef, { scoreUpdated: true });
                        if (!pSnap.exists()) t.set(pRef, { xp: data.xp, completedQuests: 1, allTimeXP: data.xp, allTimeQuests: 1 });
                        else t.update(pRef, { xp: increment(data.xp), completedQuests: increment(1), allTimeXP: increment(data.xp), allTimeQuests: increment(1) });
                    });
                } catch (e) {}
            }

            const card = document.createElement('div');
            card.className = `quest-card ${isVerified ? 'verified-border' : ''}`;
            
            // ADMIN DELETE BUTTON
            let adminBtn = `<button class="admin-del-overlay" onclick="deleteQuestRecord('${id}')">DELETE</button>`;
            
            let h = adminBtn + `<div style="display:flex; justify-content:space-between; flex-direction:column;">
                        <span style="color:var(--primary); font-size:1.2rem;">${data.title || 'QUEST'}</span>
                        <div style="display:flex; justify-content:space-between">
                            <span style="font-size:0.9rem; color:#ccc;">${data.desc}</span>
                            <span class="xp-tag">+${data.xp}</span>
                        </div>
                    </div>`;
            
            if(data.claimedBy) h += `<span class="player-tag">${data.claimedBy.toUpperCase()}</span>`;

            if(isVerified) {
                card.innerHTML = h + `<img src="${data.proofImage}" class="preview-img">`;
                cFeed.appendChild(card);
            } else {
                if(data.status === "completed") { 
                    h += `<img src="${data.proofImage}" class="preview-img"><button id="vbtn-${id}" onclick="vouch('${id}')" class="btn-vouch">VOUCH (${data.votes}/2)</button>`; 
                }
                else if(data.status === "claimed") { 
                    h += `<p style="color:var(--accent)">IN PROGRESS...</p><input type="file" onchange="uploadProof(this, '${id}')" accept="image/*"><button class="btn-cancel" onclick="forfeitQuest('${id}')">CANCEL</button>`; 
                }
                else { 
                    h += `<div id="choice-${id}"><select id="sel-${id}">${playerDropdownHtml}</select><input type="text" id="new-${id}" placeholder="Or new hero..."><button onclick="acceptWithChoice('${id}')">ACCEPT</button></div>`; 
                }
                card.innerHTML = h;
                aFeed.appendChild(card);
            }
        });
    });

    window.forfeitQuest = (id) => { if(confirm("Abandon?")) updateDoc(doc(db, "quests", id), { claimedBy: "", status: "open" }); };
    window.acceptWithChoice = async (id) => {
        const finalName = (document.getElementById(`new-${id}`).value.trim().toLowerCase() || document.getElementById(`sel-${id}`).value);
        if(!finalName) return;
        const pRef = doc(db, "players", finalName);
        if(!(await getDoc(pRef)).exists()) await setDoc(pRef, { xp: 0, completedQuests: 0, allTimeXP: 0, allTimeQuests: 0 });
        await updateDoc(doc(db, "quests", id), { claimedBy: finalName, status: "claimed" });
    };

    window.vouch = (id) => {
        const btn = document.getElementById(`vbtn-${id}`);
        if(btn) { btn.disabled = true; btn.innerText = "VOUCHING..."; }
        updateDoc(doc(db, "quests", id), { votes: increment(1) });
    };

    window.deleteQuestRecord = (id) => { if(confirm("Delete this quest?")) deleteDoc(doc(db, "quests", id)); };
    window.deleteHero = (id) => { if(confirm("Delete hero?")) deleteDoc(doc(db, "players", id)); };
    window.updateGoal = () => setDoc(doc(db, "metadata", "roundSettings"), { goal: parseInt(document.getElementById('newGoalInput').value) || 0 });
    
    window.resetRound = async () => {
        if(!confirm("Wipe current match XP?")) return;
        const qSnap = await getDocs(questCol); const pSnap = await getDocs(playerCol);
        const batch = runTransaction(db, async (transaction) => {
            qSnap.forEach(d => transaction.delete(d.ref));
            pSnap.forEach(d => transaction.update(d.ref, { xp: 0, completedQuests: 0 }));
        });
    };

    window.uploadProof = (el, id) => {
        const reader = new FileReader(); reader.readAsDataURL(el.files[0]);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas'); const scale = 800 / img.width;
                canvas.width = 800; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, 800, canvas.height);
                updateDoc(doc(db, "quests", id), { proofImage: canvas.toDataURL('image/jpeg', 0.7), status: "completed" });
            };
        };
    };

    document.getElementById('submitQuest').onclick = () => {
        const title = document.getElementById('questTitle').value;
        const desc = document.getElementById('questDesc').value;
        const risk = parseInt(document.getElementById('riskLevel').value);
        if(desc) addDoc(questCol, { title, desc, risk, xp: 100 * risk, createdAt: Date.now(), status: "open", votes: 0, claimedBy: "", scoreUpdated: false });
        document.getElementById('questTitle').value = "";
        document.getElementById('questDesc').value = "";
    };
</script>
</body>
</html>
