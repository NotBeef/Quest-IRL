<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest System & Leaderboard</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .container { display: flex; gap: 20px; }
        .card { background: #2a2a2a; border-radius: 8px; padding: 20px; flex: 1; border: 1px solid #444; }
        h2 { border-bottom: 2px solid #555; padding-bottom: 10px; }
        
        /* Leaderboard Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #444; }
        th { color: #ffd700; }

        /* Quest Styling */
        .quest-item { background: #333; margin: 10px 0; padding: 15px; border-radius: 4px; position: relative; }
        .reward { color: #4caf50; font-weight: bold; }
        .fine-print { font-size: 0.75rem; color: #888; margin-top: 10px; font-style: italic; border-top: 1px solid #444; pt: 5px; }
        
        select, button { width: 100%; padding: 8px; margin-top: 10px; cursor: pointer; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }
        .creator-badge { color: #ff4444; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<h1>Adventure Dashboard</h1>

<div class="container">
    <div class="card">
        <h2>Available Quests</h2>
        <div id="quest-list">
            </div>
    </div>

    <div class="card">
        <h2>Global Leaderboard</h2>
        <table>
            <thead>
                <tr>
                    <th>Hero Name</th>
                    <th>XP</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 1. DATA INITIALIZATION
    // Simulated "Logged In" Player
    const currentPlayer = { id: "user_01", name: "Alice" };

    // Heroes are linked to the Leaderboard via their ID and Name
    let heroes = [
        { id: "h1", ownerId: "user_01", name: "Sir Lancelot", xp: 1200 },
        { id: "h2", ownerId: "user_01", name: "Alice Mage", xp: 850 },
        { id: "h3", ownerId: "user_02", name: "Shadow Blade", xp: 2100 } // Not owned by Alice
    ];

    const quests = [
        { id: "q1", title: "Slay the Forest Troll", reward: 200, creatorId: "user_02" },
        { id: "q2", title: "My Custom Hard Quest", reward: 500, creatorId: "user_01" } // Created by Alice
    ];

    // 2. LOGIC: RENDER QUESTS
    function renderQuests() {
        const questList = document.getElementById('quest-list');
        questList.innerHTML = '';

        quests.forEach(quest => {
            const isCreator = quest.creatorId === currentPlayer.id;
            
            // Filter: Get only heroes owned by player for the dropdown
            const myHeroes = heroes.filter(h => h.ownerId === currentPlayer.id);

            const questHtml = `
                <div class="quest-item">
                    <strong>${quest.title}</strong><br>
                    <span class="reward">+${quest.reward} XP</span>
                    
                    ${isCreator ? 
                        `<p class="creator-badge">You created this quest</p>` : 
                        `<select id="select-${quest.id}">
                            <option value="">-- Select Existing Hero --</option>
                            ${myHeroes.map(h => `<option value="${h.id}">${h.name}</option>`).join('')}
                        </select>
                        <button onclick="completeQuest('${quest.id}')">Complete Quest</button>`
                    }

                    <div class="fine-print">
                        Hero names are linked to the Global Leaderboard. <br>
                        <strong>Creator cannot complete.</strong>
                    </div>
                </div>
            `;
            questList.insertAdjacentHTML('beforeend', questHtml);
        });
    }

    // 3. LOGIC: COMPLETE QUEST & UPDATE LEADERBOARD
    function completeQuest(questId) {
        const quest = quests.find(q => q.id === questId);
        const heroId = document.getElementById(`select-${questId}`).value;

        if (!heroId) {
            alert("Please select a hero first!");
            return;
        }

        // Logic check: Link Quest reward to the selected Hero
        const hero = heroes.find(h => h.id === heroId);
        hero.xp += quest.reward;

        alert(`${hero.name} completed the quest! XP added to Leaderboard.`);
        updateLeaderboard();
        renderQuests();
    }

    // 4. LOGIC: UPDATE LEADERBOARD (Sorted by XP)
    function updateLeaderboard() {
        const tbody = document.getElementById('leaderboard-body');
        
        // Sort heroes by XP descending
        const sortedHeroes = [...heroes].sort((a, b) => b.xp - a.xp);

        tbody.innerHTML = sortedHeroes.map(h => `
            <tr>
                <td>${h.name}</td>
                <td>${h.xp}</td>
            </tr>
        `).join('');
    }

    // Initial Run
    renderQuests();
    updateLeaderboard();
</script>

</body>
</html>
