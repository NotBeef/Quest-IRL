<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Side Quest RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --bg: #050505; --card: #121212; --text: #ffffff; --xp-color: #39ff14; --accent: #ffcc00; --danger: #ff4444; }
        body { font-family: 'Pixelify Sans', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; padding-bottom: 80px; }
        h1 { color: var(--primary); text-align: center; font-size: 3rem; text-shadow: 4px 4px 0px #5a008a; margin-bottom: 5px;}
        
        .goal-banner { background: #1a1a1a; border: 2px dashed var(--accent); padding: 10px; text-align: center; margin-bottom: 20px; color: var(--accent); font-size: 1.2rem; }
        .winner-announcement { background: var(--accent); color: black; padding: 15px; text-align: center; font-weight: bold; border-radius: 8px; margin-bottom: 20px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; background: var(--bg); padding: 5px 0; }
        .tab-btn { background: #222; border: 2px solid #444; padding: 10px; flex: 1; color: #888; cursor: pointer; border-bottom: 4px solid #111; font-size: 0.9rem; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); border-bottom: 4px solid #5a008a; }
        
        .quest-form { background: var(--card); padding: 20px; border: 3px solid var(--primary); margin-bottom: 30px; box-shadow: 6px 6px 0px #5a008a; }
        input, select, button { font-family: 'Pixelify Sans', sans-serif; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #333; background: #1a1a1a; color: white; font-size: 16px !important; box-sizing: border-box; }
        button { background: var(--primary); border: none; border-bottom: 4px solid #5a008a; color: white; text-transform: uppercase; cursor: pointer; }
        
        .btn-vouch { background: var(--accent); color: black !important; border-bottom: 4px solid #b8860b; width: 100%; margin-top: 10px; }
        .quest-card { background: var(--card); padding: 20px; margin-bottom: 20px; border: 3px solid #333; overflow: hidden; }
        .verified-border { border-color: var(--xp-color) !important; box-shadow: 0 0 10px var(--xp-color); }
        .xp-tag { color: var(--xp-color); font-size: 1.3rem; }
        .player-tag { color: var(--accent); font-size: 1rem; margin-bottom: 10px; display: block; border-left: 3px solid var(--accent); padding-left: 8px; }
        .preview-img { width: 100%; height: 250px; object-fit: cover; margin-top: 15px; border: 2px solid var(--primary); border-radius: 4px; display: block; }
        
        h2.board-title { text-align: center; color: var(--primary); margin-top: 30px; border-bottom: 2px solid #222; padding-bottom: 10px;}
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 2px solid var(--primary); margin-bottom: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        
        .small-del-btn, .admin-only { display: none; background: var(--danger); font-size: 0.7rem; padding: 5px; width: auto; margin: 0; }
        .admin-active .small-del-btn, .admin-active .admin-only { display: block; }
        
        .hidden { display: none; }
        footer { margin-top: 40px; color: #333; font-size: 0.7rem; cursor: pointer; opacity: 0.5; }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <h1>SIDE QUESTS</h1>
    <div id="win-zone"></div>
    <div class="goal-banner" id="goal-display">GOAL: 5000 XP</div>

    <div class="tabs">
        <button id="btn-active" class="tab-btn active" onclick="switchTab('active')">QUESTS</button>
        <button id="btn-completed" class="tab-btn" onclick="switchTab('completed')">HALL</button>
        <button id="btn-scores" class="tab-btn" onclick="switchTab('scores')">RANK</button>
    </div>

    <div id="active-section">
        <div class="quest-form">
            <h3 style="margin:0; color:var(--xp-color)">[ NEW QUEST ]</h3>
            <input type="text" id="questName" placeholder="Mission description...">
            <select id="riskLevel">
                <option value="1">Level 1: sweaty</option>
                <option value="2">Level 2: risky</option>
                <option value="3">Level 3: high life</option>
                <option value="4">Level 4: restricted</option>
                <option value="5">Level 5: insane</option>
            </select>
            <button id="submitQuest">Deploy</button>
        </div>
        <div id="activeFeed"></div>
    </div>

    <div id="completed-section" class="hidden">
        <div id="completedFeed"></div>
    </div>

    <div id="scores-section" class="hidden">
        <div class="admin-only" style="margin-bottom: 20px; border: 1px solid var(--danger); padding: 10px;">
            <p style="margin:0 0 10px 0; color:var(--danger)">ADMIN: ROUND CONTROL</p>
            <input type="number" id="newGoalInput" placeholder="Set XP Goal">
            <button onclick="updateGoal()">Set New Goal</button>
            <button class="btn-decline" onclick="resetRound()">TERMINATE ROUND (WIPE ACTIVE)</button>
        </div>

        <h2 class="board-title">CURRENT MATCH</h2>
        <table>
            <thead><tr><th>HERO</th><th>XP</th><th>-</th></tr></thead>
            <tbody id="score-body"></tbody>
        </table>

        <h2 class="board-title" style="color: var(--accent);">ALL-TIME LEGENDS</h2>
        <table>
            <thead><tr><th>HERO</th><th>QUESTS</th><th>TOTAL XP</th></tr></thead>
            <tbody id="all-time-body"></tbody>
        </table>
    </div>
    <footer onclick="adminLogin()">Admin Access</footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, increment, setDoc, getDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDw9qBL6_OxdYBhs9zghFjgueMkuLMvhiM",
      authDomain: "side-quests-9466b.firebaseapp.com",
      projectId: "side-quests-9466b",
      storageBucket: "side-quests-9466b.firebasestorage.app",
      messagingSenderId: "516078043611",
      appId: "1:516078043611:web:eb566c5cb127b56a8f67fe"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const questCol = collection(db, "quests");
    const playerCol = collection(db, "players");

    let isAdmin = false;
    let currentGoal = 5000;
    let playerOptionsHtml = '<option value="">-- Hero --</option>';

    window.adminLogin = () => { if(prompt("Code:") === "3250") { isAdmin = true; document.getElementById('mainBody').classList.add('admin-active'); } };
    window.switchTab = (type) => {
        ['active', 'completed', 'scores'].forEach(t => {
            document.getElementById(t + '-section').classList.add('hidden');
            document.getElementById('btn-' + t).classList.remove('active');
        });
        document.getElementById(type + '-section').classList.remove('hidden');
        document.getElementById('btn-' + type).classList.add('active');
    };

    onSnapshot(doc(db, "metadata", "roundSettings"), (d) => {
        if(d.exists()) {
            currentGoal = d.data().goal;
            document.getElementById('goal-display').innerText = `GOAL: ${currentGoal} XP`;
        }
    });

    window.updateGoal = async () => {
        const val = parseInt(document.getElementById('newGoalInput').value);
        if(val) await setDoc(doc(db, "metadata", "roundSettings"), { goal: val });
    };

    window.resetRound = async () => {
        if(!confirm("WIPE ACTIVE MATCH? (All-Time stats will stay!)")) return;
        const batch = writeBatch(db);
        const qSnap = await getDocs(questCol); 
        qSnap.forEach(d => batch.delete(d.ref));
        const pSnap = await getDocs(playerCol); 
        pSnap.forEach(d => batch.update(d.ref, { xp: 0, completedQuests: 0 }));
        await batch.commit();
    };

    onSnapshot(playerCol, (snapshot) => {
        const scoreBody = document.getElementById('score-body');
        const allTimeBody = document.getElementById('all-time-body');
        const winZone = document.getElementById('win-zone');
        
        scoreBody.innerHTML = ""; allTimeBody.innerHTML = ""; winZone.innerHTML = "";
        playerOptionsHtml = '<option value="">-- Hero --</option>';
        
        let players = [];
        snapshot.forEach(pDoc => {
            const p = pDoc.data();
            players.push({ id: pDoc.id, ...p });
            playerOptionsHtml += `<option value="${pDoc.id}">${pDoc.id.toUpperCase()}</option>`;
            if(p.xp >= currentGoal) winZone.innerHTML = `<div class="winner-announcement">👑 ${pDoc.id.toUpperCase()} WINS THE ROUND! 👑</div>`;
        });

        // Current Match Sorting
        [...players].sort((a,b) => (b.xp || 0) - (a.xp || 0)).forEach(p => {
            scoreBody.innerHTML += `<tr><td><strong>${p.id.toUpperCase()}</strong></td><td style="color:var(--xp-color)">${p.xp || 0}</td><td><button class="small-del-btn" onclick="deleteHero('${p.id}')">X</button></td></tr>`;
        });

        // All-Time Legend Sorting
        [...players].sort((a,b) => (b.allTimeXP || 0) - (a.allTimeXP || 0)).forEach(p => {
            allTimeBody.innerHTML += `<tr><td><strong>${p.id.toUpperCase()}</strong></td><td>${p.allTimeQuests || 0}</td><td style="color:var(--accent)">${p.allTimeXP || 0} XP</td></tr>`;
        });
    });

    window.deleteHero = async (id) => { if(confirm("Delete Player?")) await deleteDoc(doc(db, "players", id)); };
    window.deleteQuestRecord = async (id) => { if(confirm("Delete Record?")) await deleteDoc(doc(db, "quests", id.trim())); };

    document.getElementById('submitQuest').onclick = async () => {
        const name = document.getElementById('questName').value;
        const risk = parseInt(document.getElementById('riskLevel').value);
        if(!name.trim()) return;
        await addDoc(questCol, { name, risk, xp: 100 * risk, createdAt: Date.now(), status: "open", votes: 0, claimedBy: "", scoreUpdated: false });
        document.getElementById('questName').value = "";
    };

    function compressAndUpload(file, id) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH; canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                updateDoc(doc(db, "quests", id), { proofImage: canvas.toDataURL('image/jpeg', 0.7), status: "completed" });
            };
        };
    }

    onSnapshot(query(questCol, orderBy("createdAt", "desc")), (snapshot) => {
        const aFeed = document.getElementById('activeFeed');
        const cFeed = document.getElementById('completedFeed');
        aFeed.innerHTML = ""; cFeed.innerHTML = "";

        snapshot.forEach(async (qDoc) => {
            const data = qDoc.data();
            const id = qDoc.id;
            const isVerified = (data.votes >= 2);

            if (isVerified && !data.scoreUpdated && data.claimedBy) {
                await updateDoc(doc(db, "quests", id), { scoreUpdated: true });
                const pRef = doc(db, "players", data.claimedBy.toLowerCase());
                const pSnap = await getDoc(pRef);
                
                if(pSnap.exists()) {
                    await updateDoc(pRef, { 
                        xp: increment(data.xp), 
                        completedQuests: increment(1),
                        allTimeXP: increment(data.xp),      // NEW: Permanent XP
                        allTimeQuests: increment(1)        // NEW: Permanent Count
                    });
                } else {
                    await setDoc(pRef, { 
                        xp: data.xp, 
                        completedQuests: 1,
                        allTimeXP: data.xp,
                        allTimeQuests: 1 
                    });
                }
            }

            const card = document.createElement('div');
            card.className = `quest-card ${isVerified ? 'verified-border' : ''}`;
            let h = `<div style="display:flex; justify-content:space-between"><span>${data.name}</span><span class="xp-tag">+${data.xp}</span></div>`;
            if(data.claimedBy) h += `<span class="player-tag">${data.claimedBy.toUpperCase()}</span>`;

            if(isVerified) {
                card.innerHTML = h + `<img src="${data.proofImage}" class="preview-img"><button class="small-del-btn" style="width:100%;margin-top:10px;" id="del-${id}">DELETE ARCHIVE</button>`;
                cFeed.appendChild(card);
                if(document.getElementById(`del-${id}`)) document.getElementById(`del-${id}`).onclick = () => deleteQuestRecord(id);
            } else {
                if(data.status === "completed") { h += `<img src="${data.proofImage}" class="preview-img"><button id="v-${id}" class="btn-vouch">VOUCH (${data.votes}/2)</button>`; }
                else if(data.status === "claimed") { h += `<p style="color:var(--accent)">IN PROGRESS...</p><input type="file" id="f-${id}" accept="image/*">`; }
                else { h += `<div id="act-${id}"><button id="acc-${id}">ACCEPT</button><button class="btn-decline small-del-btn" id="dec-${id}">X</button></div>
                             <div id="clz-${id}" class="hidden"><select id="sel-${id}">${playerOptionsHtml}</select><input type="text" id="pname-${id}" placeholder="New..."><button id="cf-${id}">START</button></div>`; }
                card.innerHTML = h;
                aFeed.appendChild(card);

                if(document.getElementById(`v-${id}`)) document.getElementById(`v-${id}`).onclick = () => updateDoc(doc(db, "quests", id), { votes: increment(1) });
                if(document.getElementById(`acc-${id}`)) document.getElementById(`acc-${id}`).onclick = () => { document.getElementById(`act-${id}`).classList.add('hidden'); document.getElementById('clz-'+id).classList.remove('hidden'); };
                if(document.getElementById(`cf-${id}`)) document.getElementById(`cf-${id}`).onclick = async () => {
                    const final = (document.getElementById(`sel-${id}`).value || document.getElementById(`pname-${id}`).value).toLowerCase();
                    if(!final) return;
                    const pRef = doc(db, "players", final);
                    const snap = await getDoc(pRef);
                    if(!snap.exists()) {
                        await setDoc(pRef, { xp: 0, completedQuests: 0, allTimeXP: 0, allTimeQuests: 0 });
                    }
                    await updateDoc(doc(db, "quests", id), { claimedBy: final, status: "claimed" });
                };
                if(document.getElementById(`dec-${id}`)) document.getElementById(`dec-${id}`).onclick = () => deleteDoc(doc(db, "quests", id));
                if(document.getElementById(`f-${id}`)) document.getElementById(`f-${id}`).onchange = (e) => compressAndUpload(e.target.files[0], id);
            }
        });
    });
</script>
</body>
</html>
